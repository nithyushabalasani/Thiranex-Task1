<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact | Nithyusha Portfolio</title>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <header class="header">

    <div class="container">

      <h1 class="logo">Nithyusha</h1>

      <nav aria-label="Main Navigation">

        <ul class="nav-links">

          <li><a href="index.html">Home</a></li>

          <li><a href="about.html">About</a></li>

          <li><a href="projects.html">Projects</a></li>

          <li><a href="contact.html" aria-current="page">Contact</a></li>

        </ul>

      </nav>

    </div>

  </header>

  <main>

    <section class="section">

      <div class="container">

        <h2>Contact Me</h2>

        <form class="contact-form" aria-label="Contact Form">

          <label for="name">Full Name</label>

          <input
            type="text"
            id="name"
            name="name"
            required
          />

          <label for="email">Email Address</label>

          <input
            type="email"
            id="email"
            name="email"
            required
          />

          <label for="message">Message</label>

          <textarea
            id="message"
            name="message"
            rows="6"
            required
          ></textarea>

          <button type="submit" class="btn">
            Send Message
          </button>

        </form>

      </div>

    </section>

  </main>

  <footer class="footer">

    <div class="container">

      <p>© 2026 Nithyusha Portfolio</p>

    </div>

  </footer>

</body>

</html>
